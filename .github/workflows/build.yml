name: Compilar Instalador EXE

on:
  push:
    branches: [main]
    paths:
      - install_gui.ps1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar PS2EXE
        shell: powershell
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name PS2EXE -Force -Scope CurrentUser

      - name: Compilar install_gui.ps1 a EXE
        shell: powershell
        run: |
          Import-Module PS2EXE
          Invoke-PS2EXE `
            -InputFile   "install_gui.ps1" `
            -OutputFile  "instalar_rustdesk.exe" `
            -Title       "Instalador RustDesk - Compulibra" `
            -Description "Instala y configura RustDesk automaticamente" `
            -Company     "Compulibra" `
            -Version     "2.0.0.0" `
            -requireAdmin `
            -NoConsole

          if (-not (Test-Path "instalar_rustdesk.exe")) {
            Write-Error "Compilación fallida: no se generó el EXE"
            exit 1
          }
          $kb = [Math]::Round((Get-Item "instalar_rustdesk.exe").Length / 1KB, 0)
          Write-Host "EXE generado correctamente ($kb KB)"

      - name: Publicar Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-installer
          name: "Instalador RustDesk — Compulibra v2.0"
          body: |
            ## Instalador RustDesk — Compulibra

            ### Cómo instalar
            1. Descargá **instalar_rustdesk.exe** (botón de abajo)
            2. Doble clic para ejecutar
            3. Aceptá la ventana de seguridad de Windows (UAC)
            4. Leé el aviso de seguridad y marcá la casilla de confirmación
            5. Hacé clic en **Instalar** y esperá 3-5 minutos

            RustDesk se instala y configura automáticamente con el servidor de Compulibra.
            Al terminar, el instalador mostrará tu **ID de RustDesk** para compartir con el técnico.

            ### Novedades v2.0
            - Interfaz gráfica con progreso de descarga en tiempo real
            - Aviso de seguridad: solo instalar si un técnico lo solicitó
            - Detecta si hay una versión instalada y la actualiza
            - Muestra el ID de RustDesk al finalizar
            - Configuración via TOML y registro de Windows (mayor confiabilidad)
          artifacts: instalar_rustdesk.exe
          allowUpdates: true
          makeLatest: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
